escalation:
  max_wait_days: 2
  revenue_impact_threshold: 100
  sla_breach_priority: critical
langfuse:
  host: https://cloud.langfuse.com
  #public_key: ${pk-lf-35677bcd-9e9c-4bf0-b468-12bb1150c3be}
  #secret_key: ${sk-lf-1940c94f-9c84-4260-a814-f3c1fcef114d}
llm:
  base_url: http://localhost:11434
  max_tokens: 4096
  model: qwen3.5:cloud
  provider: ollama_cloud
  temperature: 0.1
logging:
  format: '%(asctime)s | %(name)s | %(levelname)s | %(message)s'
  level: INFO
memory:
  context_window_buffer: 500
  max_agent_findings_per_agent: 5
  max_history_turns: 20
tools:
  failure_rate: 0.08
  latency:
    max_ms: 800
    min_ms: 100
  timeout_ms: 5000
